services:
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    expose:
      - "3000"
    environment:
      PORT: 3000
      CONFIGURATOR_URL: http://car-configurator:3001
      MERCH_URL: http://merch-shop:3002
      CART_URL: http://shopping-cart:3005
      AI_URL: http://ai-feature:3004
      ROUTE_URL: http://route-service:3007
    depends_on:
      - car-configurator
      - merch-shop
      - shopping-cart
      - ai-feature
      - route-service
    volumes:
      - ./api-gateway/src:/app/api-gateway/src

  web-shop-frontend:
    build:
      context: .
      dockerfile: services/web-shop-frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      WEB_SHOP_BACKEND_URL: http://web-shop-backend:3006
    depends_on:
      - web-shop-backend
    volumes:
      - ./web:/app/web

  web-shop-backend:
    build:
      context: .
      dockerfile: services/web-shop-backend/Dockerfile
    expose:
      - "3006"
    environment:
      PORT: 3006
      API_GATEWAY_URL: http://api-gateway:3000
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    depends_on:
      - api-gateway
    volumes:
      - ./web:/app/web

  car-configurator:
    build:
      context: ./services/car-configurator
    expose:
      - "3001"
    environment:
      PORT: 3001
      MYSQL_HOST: mysql-configurator
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${DBE_CLOUDDEV_CONFIGURATOR}
      MYSQL_PASSWORD: ${DBE_CLOUDDEV_CONFIGURATOR_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      mysql-configurator-seed:
        condition: service_completed_successfully

  merch-shop:
    build:
      context: ./services/merch-shop
    expose:
      - "3002"
    environment:
      PORT: 3002
      MYSQL_HOST: mysql-merch
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${DBE_CLOUDDEV_MERCH}
      MYSQL_PASSWORD: ${DBE_CLOUDDEV_MERCH_PASSWORD}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_BUCKET: ${MINIO_BUCKET}
    depends_on:
      mysql-merch-seed:
        condition: service_completed_successfully

  shopping-cart:
    build:
      context: ./services/shopping-cart
    expose:
      - "3005"
    environment:
      PORT: 3005
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      - redis

  ai-feature:
    build:
      context: ./services/ai-feature
    expose:
      - "3004"
    environment:
      PORT: 3004
      CONFIGURATOR_URL: http://car-configurator:3001
      MERCH_URL: http://merch-shop:3002
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_FALLBACK_MODEL: ${GEMINI_FALLBACK_MODEL:-gemini-2.5-flash-lite}
    depends_on:
      - car-configurator
      - merch-shop

  route-service:
    build:
      context: ./services/route-service
    expose:
      - "3007"
    environment:
      PORT: 3007
      MYSQL_HOST: mysql-route
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${DBE_CLOUDDEV_ROUTE}
      MYSQL_PASSWORD: ${DBE_CLOUDDEV_ROUTE_PASSWORD}
    depends_on:
      mysql-route-seed:
        condition: service_completed_successfully

  mysql-configurator:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DBE_CLOUDDEV_CONFIGURATOR_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DBE_CLOUDDEV_CONFIGURATOR_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - mysql_configurator_data:/var/lib/mysql

  mysql-configurator-seed:
    image: mysql:8.4
    depends_on:
      mysql-configurator:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql-configurator
      ROOT_PASSWORD: ${DBE_CLOUDDEV_CONFIGURATOR_ROOT_PASSWORD}
      APP_USER: ${DBE_CLOUDDEV_CONFIGURATOR}
      APP_PASSWORD: ${DBE_CLOUDDEV_CONFIGURATOR_PASSWORD}
      APP_DATABASE: bmw_car_configurator
      SEED_FILE: /seed/02_car_configurator.sql
    volumes:
      - ./infrastructure/mysql/init:/seed:ro
      - ./infrastructure/mysql/seed-service.sh:/seed-service.sh:ro
    entrypoint: ["/bin/sh", "/seed-service.sh"]

  mysql-merch:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DBE_CLOUDDEV_MERCH_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DBE_CLOUDDEV_MERCH_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - mysql_merch_data:/var/lib/mysql

  mysql-merch-seed:
    image: mysql:8.4
    depends_on:
      mysql-merch:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql-merch
      ROOT_PASSWORD: ${DBE_CLOUDDEV_MERCH_ROOT_PASSWORD}
      APP_USER: ${DBE_CLOUDDEV_MERCH}
      APP_PASSWORD: ${DBE_CLOUDDEV_MERCH_PASSWORD}
      APP_DATABASE: bmw_merch_shop
      SEED_FILE: /seed/01_merch_shop.sql
    volumes:
      - ./infrastructure/mysql/init:/seed:ro
      - ./infrastructure/mysql/seed-service.sh:/seed-service.sh:ro
    entrypoint: ["/bin/sh", "/seed-service.sh"]

  mysql-route:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DBE_CLOUDDEV_ROUTE_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DBE_CLOUDDEV_ROUTE_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - mysql_route_data:/var/lib/mysql

  mysql-route-seed:
    image: mysql:8.4
    depends_on:
      mysql-route:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql-route
      ROOT_PASSWORD: ${DBE_CLOUDDEV_ROUTE_ROOT_PASSWORD}
      APP_USER: ${DBE_CLOUDDEV_ROUTE}
      APP_PASSWORD: ${DBE_CLOUDDEV_ROUTE_PASSWORD}
      APP_DATABASE: bmw_route_service
      SEED_FILE: /seed/03_route_service.sql
    volumes:
      - ./infrastructure/mysql/init:/seed:ro
      - ./infrastructure/mysql/seed-service.sh:/seed-service.sh:ro
    entrypoint: ["/bin/sh", "/seed-service.sh"]

  redis:
    image: redis:8-alpine

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - ./infrastructure/minio/data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./assets/configurator:/seed/configurator:ro
      - ./assets/merch-shop:/seed/merch-shop:ro
      - ./web/public/images:/seed/home-images:ro
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:${MINIO_PORT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/${MINIO_BUCKET};
      mc anonymous set download local/${MINIO_BUCKET};
      mc mirror --overwrite /seed/configurator local/${MINIO_BUCKET}/configurator;
      mc mirror --overwrite /seed/merch-shop local/${MINIO_BUCKET}/merch-shop;
      mc mirror --overwrite /seed/home-images local/${MINIO_BUCKET}/home;
      echo 'Done.';
      "

volumes:
  mysql_configurator_data:
  mysql_merch_data:
  mysql_route_data:
